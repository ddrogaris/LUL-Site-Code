    var map = L.map('lul-slices-map', {
        center: [34.1468, -118.7601],
        zoom: 13,
        zoomControl: true,
        scrollWheelZoom: false
        scrollWheelZoom: false, keyboard: false

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 19
    }).addTo(map);

    // Assign each unique slice name a distinct hue spread across the color wheel
    // Uses golden angle stepping for maximum perceptual separation
    var nameIndex = {};
    var idx = 0;
    SLICES_DATA.features.forEach(function(f) {
        var n = f.properties.name;
        if (!(n in nameIndex)) nameIndex[n] = idx++;
    });
    var total = idx;

    function sliceColor(name) {
        var i = nameIndex[name];
        // Golden angle: 137.508 degrees — guarantees no two adjacent hues are similar
        var hue = (i * 137.508) % 360;
        return 'hsl(' + Math.round(hue) + ',42%,58%)';
    }

    function formatType(t) {
        if (t === 'primarily_residential') return 'Primarily Residential';
        if (t === 'nonresidential')        return 'Nonresidential';
        if (t === 'mixed')                 return 'Mixed';
        return t;
    }

    function fmt(t) {
        if (!t || t === 'null') return '\u2014';
        return t.charAt(0).toUpperCase() + t.slice(1);
    }

    function popupHtml(p) {
        return '<div class="lul-popup">' +
            '<div class="lul-popup-name">' + p.name + '</div>' +
            '<div class="lul-popup-type">' + formatType(p.type) + ' &middot; ' + Math.round(p.acres) + ' acres</div>' +
            '<hr class="lul-popup-divider"/>' +
            '<div class="lul-popup-row"><span>1-Family</span><span>' + fmt(p.family1_treatment) + '</span></div>' +
            '<div class="lul-popup-row"><span>2-Family</span><span>' + fmt(p.family2_treatment) + '</span></div>' +
            '<div class="lul-popup-row"><span>3-Family</span><span>' + fmt(p.family3_treatment) + '</span></div>' +

        '</div>';
    }

    L.geoJSON(SLICES_DATA, {
        style: function(feature) {
            return {
                fillColor: sliceColor(feature.properties.name),
                fillOpacity: 0.6,
                color: '#fff',
                weight: 1.5
            };
        },
        onEachFeature: function(feature, layer) {
            layer.bindPopup(popupHtml(feature.properties), { maxWidth: 260 });
            layer.on('mouseover', function() { layer.setStyle({ fillOpacity: 0.9, weight: 2 }); });
            layer.on('mouseout',  function() { layer.setStyle({ fillOpacity: 0.6, weight: 1.5 }); });
        }
    }).addTo(map);
